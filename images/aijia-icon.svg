<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="dropGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4361EE"/>
      <stop offset="45%" style="stop-color:#7209B7"/>
      <stop offset="100%" style="stop-color:#FF8C42"/>
    </linearGradient>

    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#4361EE" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- 油滴 -->
  <path d="
    M 200 85
    C 200 85, 260 160, 280 215
    C 300 270, 265 310, 200 325
    C 135 310, 100 270, 120 215
    C 140 160, 200 85, 200 85
    Z
  " fill="url(#dropGrad)" filter="url(#soft)"/>

  <!-- 星芒：四芒星，尖锐细长的四个臂 -->
  <g transform="translate(200, 225) scale(0.85) translate(-200, -210)">
    <path d="
      M 200 155
      C 204 195, 208 200, 250 210
      C 208 220, 204 225, 200 265
      C 196 225, 192 220, 150 210
      C 192 200, 196 195, 200 155
      Z
    " fill="white" opacity="0.95"/>
  </g>
</svg>
